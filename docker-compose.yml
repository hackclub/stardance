services:
  web:
    build:
      context: .
      dockerfile: dev.Dockerfile
    command: bin/dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules_cache:/app/node_modules
      - bundle_cache:/usr/local/bundle
    environment:
      - RAILS_ENV=development
      - FERRET=${FERRET:-}
    depends_on:
      - db

  db:
    image: pgvector/pgvector:pg16
    volumes:
      - stardance_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=pass
      - POSTGRES_USER=postgres
      - POSTGRES_DB=stardance_development
    ports:
      - "5432:5432"

volumes:
  stardance_postgres_data:
  bundle_cache:
  node_modules_cache:
